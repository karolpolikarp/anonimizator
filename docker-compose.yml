# Wygoda: `docker compose up -d` działa z katalogu głównego repo.
# Jedyna usługa dockerowa to opcjonalny lokalny NER (aplikacja webowa i CLI go nie wymagają).
# Pełna dokumentacja: services/ner/README.md
services:
  ner:
    build:
      context: ./services/ner
      # Backend SOTA (HerBERT, lepszy recall nazwisk — większy obraz): odkomentuj args.
      # Lżejszy spaCy na słabszy sprzęt: SPACY_MODEL: pl_core_news_md
      # args:
      #   NER_BACKEND: herbert
    ports:
      # Bind TYLKO na localhost — usługa nie jest widoczna z sieci.
      - "127.0.0.1:8090:8090"
    environment:
      PII_NER_API_KEY: ""
      PII_NER_LABELS: "persName"
    restart: unless-stopped
